<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<meta name="theme-color" content="#3a0f2b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Ljubičica se vraća 💗</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600&family=Playfair+Display:wght@700&family=Quicksand:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep: #3a0f2b;
    --bg-mid: #6b1e4d;
    --blush: #ff7aa2;
    --gold: #f3c969;
    --cream: #fff3e9;
    --cream-dim: #f6d9c8;
  }

  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body{
    margin:0; padding:0;
    height:100%;
    background: var(--bg-deep);
    overflow: hidden;
    font-family: 'Quicksand', -apple-system, sans-serif;
    -webkit-text-size-adjust: 100%;
  }

  #app{
    position: fixed;
    inset: 0;
    background: radial-gradient(120% 120% at 50% 15%, var(--bg-mid) 0%, var(--bg-deep) 65%, #220818 100%);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    text-align:center;
    overflow-y: auto;
    padding: clamp(16px, 5vw, 24px);
    padding-top: max(clamp(16px, 5vw, 24px), env(safe-area-inset-top));
    padding-bottom: max(clamp(16px, 5vw, 24px), env(safe-area-inset-bottom));
    padding-left: max(clamp(16px, 5vw, 24px), env(safe-area-inset-left));
    padding-right: max(clamp(16px, 5vw, 24px), env(safe-area-inset-right));
  }

  /* Floating hearts background */
  .hearts{
    position:absolute; inset:0;
    overflow:hidden;
    pointer-events:none;
  }
  .heart{
    position:absolute;
    bottom:-10%;
    opacity:0.55;
    animation: rise linear infinite;
    filter: drop-shadow(0 0 6px rgba(255,122,162,0.35));
  }
  .heart svg{ width:100%; height:100%; display:block; }

  @keyframes rise{
    0%{ transform: translateY(0) translateX(0) rotate(0deg); opacity:0; }
    10%{ opacity:0.6; }
    90%{ opacity:0.5; }
    100%{ transform: translateY(-115vh) translateX(var(--drift,20px)) rotate(15deg); opacity:0; }
  }

  .message{
    position:relative;
    z-index:2;
    font-family: 'Cormorant Garamond', 'Playfair Display', Georgia, serif;
    font-style:italic;
    font-weight:600;
    font-size: clamp(18px, 5.5vw, 40px);
    color: var(--cream);
    letter-spacing: 0.5px;
    margin-bottom: clamp(20px, 5vw, 52px);
    text-shadow: 0 2px 18px rgba(255,122,162,0.35);
    max-width: 90vw;
  }
  .message .heartmark{
    color: var(--blush);
    font-style: normal;
  }

  .counter-ring{
    position:relative;
    z-index:2;
    display:flex;
    gap: clamp(4px, 2vw, 28px);
    align-items:center;
    justify-content:center;
    flex-wrap: wrap;
    row-gap: clamp(12px, 3vw, 28px);
    max-width: 100%;
  }

  .unit{
    display:flex; flex-direction:column; align-items:center;
    min-width: clamp(46px, 14vw, 96px);
  }

  .unit .value{
    font-family: 'Playfair Display', Georgia, serif;
    font-weight:700;
    font-size: clamp(26px, 11vw, 88px);
    line-height:1.2;
padding-top: 0.1em;
    color: var(--cream);
    background: linear-gradient(180deg, var(--cream) 0%, var(--gold) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 14px rgba(243,201,105,0.35));
    font-variant-numeric: tabular-nums;
  }

  .unit .label{
    margin-top: 6px;
    font-size: clamp(9px, 2.2vw, 14px);
    letter-spacing: clamp(1px, 0.6vw, 3px);
    text-transform: uppercase;
    color: var(--cream-dim);
    opacity:0.85;
    white-space: nowrap;
  }

  .sep{
    color: var(--blush);
    font-size: clamp(16px, 6vw, 48px);
    line-height:1;
    transform: translateY(-6px);
    opacity:0.8;
  }

  .subline{
    position:relative; z-index:2;
    margin-top: clamp(18px, 4vw, 40px);
    color: var(--cream-dim);
    font-size: clamp(11px, 2.4vw, 15px);
    letter-spacing: 1.5px;
    opacity:0.75;
    padding: 0 8px;
  }

  .done{
    position:relative; z-index:2;
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(24px, 7vw, 56px);
    color: var(--gold);
    text-shadow: 0 0 30px rgba(243,201,105,0.4);
  }

  @media (max-width: 360px){
    .counter-ring{ gap: 2px; }
    .unit{ min-width: 42px; }
  }

  @media (max-height: 480px) and (orientation: landscape){
    #app{ padding-top: 10px; padding-bottom: 10px; }
    .message{ margin-bottom: 12px; font-size: clamp(14px, 3.5vw, 26px); }
    .unit .value{ font-size: clamp(20px, 6vw, 48px); }
    .subline{ margin-top: 10px; }
  }

  @media (prefers-reduced-motion: reduce){
    .heart{ animation: none; opacity:0.25; }
  }
</style>
</head>
<body>

<div id="app">
  <div class="hearts" id="heartsLayer"></div>

  <div class="message" id="message">
    <span class="heartmark">♥</span> Ljubičica mi se vraća <span class="heartmark">♥</span>
  </div>

  <div class="counter-ring" id="counterRing">
    <div class="unit"><div class="value" id="dd">--</div><div class="label">dana</div></div>
    <div class="sep">:</div>
    <div class="unit"><div class="value" id="hh">--</div><div class="label">sati</div></div>
    <div class="sep">:</div>
    <div class="unit"><div class="value" id="mm">--</div><div class="label">minuta</div></div>
    <div class="sep">:</div>
    <div class="unit"><div class="value" id="ss">--</div><div class="label">sekundi</div></div>
  </div>

</div>

<script>
  // ----- Target date: 27 July 2026, 13:00 local time -----
  const TARGET = new Date(2026, 6, 27, 19, 0, 0);

  const dd = document.getElementById('dd');
  const hh = document.getElementById('hh');
  const mm = document.getElementById('mm');
  const ss = document.getElementById('ss');
  const ring = document.getElementById('counterRing');
  const subline = document.getElementById('subline');
  const app = document.getElementById('app');

  function pad(n){ return String(n).padStart(2,'0'); }

  function tick(){
    const now = new Date();
    let diff = TARGET - now;

    if(diff <= 0){
      ring.style.display = 'none';
      subline.style.display = 'none';
      const done = document.createElement('div');
      done.className = 'done';
      done.textContent = 'Kod kuće je. ♥';
      app.insertBefore(done, subline);
      clearInterval(timer);
      return;
    }

    const days = Math.floor(diff / (1000*60*60*24));
    diff -= days*1000*60*60*24;
    const hours = Math.floor(diff / (1000*60*60));
    diff -= hours*1000*60*60;
    const mins = Math.floor(diff / (1000*60));
    diff -= mins*1000*60;
    const secs = Math.floor(diff / 1000);

    dd.textContent = pad(days);
    hh.textContent = pad(hours);
    mm.textContent = pad(mins);
    ss.textContent = pad(secs);
  }

  const timer = setInterval(tick, 1000);
  tick();

  // ----- Floating hearts background -----
  const heartsLayer = document.getElementById('heartsLayer');
  const HEART_PATH = 'M50 88 C 20 65, 5 45, 5 28 C 5 12, 18 2, 32 2 C 42 2, 48 8, 50 14 C 52 8, 58 2, 68 2 C 82 2, 95 12, 95 28 C 95 45, 80 65, 50 88 Z';

  function spawnHeart(){
    const wrap = document.createElement('div');
    wrap.className = 'heart';
    const size = 14 + Math.random()*28;
    const left = Math.random()*100;
    const duration = 9 + Math.random()*10;
    const delay = Math.random()*6;
    const drift = (Math.random()*80 - 40) + 'px';
    const hue = Math.random() > 0.5 ? '#ff7aa2' : '#f3c969';

    wrap.style.left = left + 'vw';
    wrap.style.width = size + 'px';
    wrap.style.height = size + 'px';
    wrap.style.animationDuration = duration + 's';
    wrap.style.animationDelay = '-' + delay + 's';
    wrap.style.setProperty('--drift', drift);

    wrap.innerHTML = '<svg viewBox="0 0 100 90"><path d="' + HEART_PATH + '" fill="' + hue + '"/></svg>';
    heartsLayer.appendChild(wrap);
  }

  const heartCount = window.innerWidth < 480 ? 16 : 26;
  for(let i=0;i<heartCount;i++) spawnHeart();
</script>

</body>
</html>
